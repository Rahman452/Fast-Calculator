<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Right</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* বডিকে স্ক্রলেবল করা হয়েছে যাতে কিবোর্ড আসলে পুরো পাতা স্ক্রল হয় */
        body { 
            margin: 0; padding: 0; background-color: #f3f4f6; 
            min-height: 100svh; display: flex; align-items: center; justify-content: center;
        }
        
        .app-shell { 
            width: 100%; max-width: 400px; min-height: 100svh;
            background: #ffffff; display: flex; flex-direction: column;
            /* overflow hidden সরিয়ে দেওয়া হয়েছে যাতে কিবোর্ড আসলে হেডারসহ সবকিছু উপরে যায় */
        }
        
        .scroll-area { flex: 1; padding-bottom: 20px; }
        
        .ride-card { transition: all 0.3s ease; border: 2px solid #22c55e; }
        .golden-active { border: 3px solid #fbbf24 !important; background-color: #fffbeb !important; box-shadow: 0 0 15px rgba(251, 191, 36, 0.5) !important; }
    </style>
</head>
<body>

    <div class="app-shell">
        
        <!-- হেডার - ব্যাকগ্রাউন্ড গ্রেডিয়েন্ট পরিবর্তন এবং টেক্সট কালার অ্যাডজাস্ট -->
        <div class="px-6 pt-6 pb-4 bg-gradient-to-br from-purple-600 via-pink-500 to-orange-400 rounded-b-[2rem] text-center shadow-md">
            <div class="flex flex-col items-center justify-center">
                <p class="text-[14px] font-bold text-white uppercase tracking-[0.2em] mb-1">Welcome to</p>
                <h1 class="text-3xl font-black text-yellow-300 uppercase leading-tight tracking-wider">SUPER RIGHT</h1>
                <p class="text-[12px] font-bold text-white/90 uppercase tracking-[0.3em]">Fast Coming</p>
            </div>
        </div>

        <!-- মেইন এরিয়া - কোন পরিবর্তন নেই -->
        <div class="scroll-area p-6 space-y-4">
            <div class="w-full h-72 bg-white rounded-3xl flex flex-col items-center justify-center border-2 border-green-500 shadow-sm">
                <span class="text-green-600 text-5xl mb-2">📍</span>
                <span class="text-green-700 font-black text-[10px] tracking-widest uppercase">Live Map Tracking</span>
            </div>
            
            <div class="bg-white p-4 rounded-2xl border-2 border-green-500 flex items-center shadow-sm">
                <span class="text-green-600 mr-3 text-xl">🔍</span>
                <input type="text" placeholder="WHERE TO?" class="bg-transparent text-gray-700 w-full outline-none text-sm font-bold">
            </div>

            <div class="grid grid-cols-3 gap-3">
                <!-- অপশনস... - কোন পরিবর্তন নেই -->
                <div class="ride-card p-3 rounded-2xl text-center cursor-pointer golden-active" onclick="selectRide(this)">
                    <div class="text-xl">🛵</div>
                    <div class="text-[9px] text-gray-700 font-black mt-1">BIKE</div>
                </div>
                <div class="ride-card p-3 bg-white rounded-2xl text-center cursor-pointer" onclick="selectRide(this)">
                    <div class="text-xl">🛺</div>
                    <div class="text-[9px] text-gray-500 font-bold mt-1">AUTO</div>
                </div>
                <div class="ride-card p-3 bg-white rounded-2xl text-center cursor-pointer" onclick="selectRide(this)">
                    <div class="text-xl">🚕</div>
                    <div class="text-[9px] text-gray-500 font-bold mt-1">CAR</div>
                </div>
            </div>
        </div>

        <!-- ফুটার - কোন পরিবর্তন নেই -->
        <div class="p-6 border-t bg-white">
            <button class="w-full py-4 bg-green-600 text-white font-black rounded-2xl shadow-lg uppercase">Book Ride</button>
        </div>
    </div>

    <script>
        // স্ক্রিপ্ট - কোন পরিবর্তন নেই
        function selectRide(element) {
            document.querySelectorAll('.ride-card').forEach(card => card.classList.remove('golden-active'));
            element.classList.add('golden-active');
        }
    </script>
</body>
</html>
