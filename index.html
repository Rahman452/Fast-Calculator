<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Calculator Pro</title>
    <style>
    :root { --bg: #000000; --text: #ffffff; --btn-gray: #202020; --btn-orange: #FF6600; }
    .light-mode { --bg: #f5f5f5; --text: #000000; --btn-gray: #e0e0e0; --btn-orange: #FF9500; }

    body { background-color: var(--bg); margin: 0; height: 100vh; overflow: hidden; font-family: sans-serif; transition: 0.3s; -webkit-user-select: none; user-select: none; }
    
    .calculator { 
        width: 100%; 
        height: 100%; 
        display: flex; 
        flex-direction: column; 
        padding: 10px; 
        box-sizing: border-box; 
    }
    
    .top-bar { display: flex; justify-content: space-between; color: var(--text); padding-bottom: 5px; }
    
    #display-area { 
        text-align: right; 
        flex-grow: 1; 
        display: flex; 
        flex-direction: column; 
        justify-content: flex-end; 
        padding: 10px; 
        overflow: hidden;
    }
    
    #prev-calc { color: var(--btn-orange); font-size: 18px; height: 25px; }
    #result { width: 100%; background: transparent; border: none; color: var(--text); font-size: 50px; text-align: right; outline: none; }
    #live-preview { color: #888; font-size: 20px; height: 25px; }

    .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding-bottom: 10px; }
    
    button { 
        height: 60px; 
        border: none; 
        border-radius: 15px; 
        font-size: 22px; 
        cursor: pointer; 
        background: var(--btn-gray); 
        color: var(--text); 
    }
    button:active { opacity: 0.7; }
    .orange { background-color: var(--btn-orange); color: white; }
    .text-orange { color: var(--btn-orange); font-weight: bold; }

    #history-panel { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); display: none; padding: 20px; z-index: 100; overflow-y: auto; }
    </style>

</head>
<body>

<div class="calculator">
    <div class="top-bar">
        <span onclick="toggleMode()">☀️/🌙</span>
        <span onclick="toggleHistory()" style="font-weight: bold; cursor: pointer;">HISTORY</span>
    </div>

    <div id="display-area">
        <div id="prev-calc"></div>
        <input type="text" id="result" value="0" readonly>
        <div id="live-preview"></div>
    </div>

    <div class="keypad">
        <button class="text-orange" onclick="vibrate(); add('AC')">AC</button>
        <button class="text-orange" id="delBtn">DEL</button>
        <button class="text-orange" onclick="vibrate(); add('%')">%</button>
        <button class="orange" onclick="vibrate(); add('/')">÷</button>
        <button onclick="vibrate(); add('7')">7</button><button onclick="vibrate(); add('8')">8</button><button onclick="vibrate(); add('9')">9</button>
        <button class="orange" onclick="vibrate(); add('*')">×</button>
        <button onclick="vibrate(); add('4')">4</button><button onclick="vibrate(); add('5')">5</button><button onclick="vibrate(); add('6')">6</button>
        <button class="orange" onclick="vibrate(); add('-')">-</button>
        <button onclick="vibrate(); add('1')">1</button><button onclick="vibrate(); add('2')">2</button><button onclick="vibrate(); add('3')">3</button>
        <button class="orange" onclick="vibrate(); add('+')">+</button>
        <button onclick="vibrate(); add('00')">00</button><button onclick="vibrate(); add('0')">0</button>
        <button onclick="vibrate(); add('.')">.</button>
        <button class="orange" onclick="vibrate(); calculate()">=</button>
    </div>
</div>

<div id="history-panel">
    <h3>History</h3>
    <div id="history-list"></div>
    <button onclick="toggleHistory()" style="width:100%; margin-top:20px; padding: 15px; border-radius: 10px;">Back</button>
</div>

        let parts = n.toString().split(".");
        parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        return parts.join(".");
    }

        let cur = res.value.replace(/,/g, '');
        if (v === 'AC') { res.value = '0'; prev.innerText = ''; preview.innerText = ''; }

            if (['+', '-', '*', '/'].includes(v) && ['+', '-', '*', '/'].includes(cur.slice(-1))) cur = cur.slice(0, -1);
            res.value = (cur === '0' && v !== '.') ? v : formatNum(cur + v);
        }
        res.scrollLeft = res.scrollWidth;
        updateLive();
    }

        let expr = res.value.replace(/,/g, '');

            try { preview.innerText = formatNum(eval(expr)); } catch { preview.innerText = ''; }
        } else { preview.innerText = ''; }
    }

            }

    }
